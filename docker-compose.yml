services:
    app:
        image: maven:3.9.6-eclipse-temurin-21
        command: mvn spring-boot:run -Dspring-boot.run.profiles=dev
        ports:
            - "8086:8086"
        volumes:
            - .:/usr/src/app # Mount the local 'volume' directory to /usr/src/app in the container
            - ~/.m2:/root/.m2
        working_dir: /usr/src/app
        networks:
            - clinic-network

    postgres:
        image: postgres:16
        container_name: clinic-postgres
        environment:
            POSTGRES_DB: clinic
            POSTGRES_USER: clinic
            POSTGRES_PASSWORD: clinic
        ports:
            - "5430:5432"
        volumes:
            - clinic_pg_data:/var/lib/postgresql/data

volumes:
    clinic_pg_data:

networks:
    clinic-network:
        external: true
        driver: bridge
